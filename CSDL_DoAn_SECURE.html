function App() {
      const [tables, setTables] = useState(COMPREHENSIVE_TABLES);
      const [selectedSchema, setSelectedSchema] = useState("all");
      const [selectedPathway, setSelectedPathway] = useState("all");
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedTable, setSelectedTable] = useState(null);
      const [zoom, setZoom] = useState(0.75);
      const [pan, setPan] = useState({ x: 300, y: 100 });
      const [isDraggingCanvas, setIsDraggingCanvas] = useState(false);
      const [draggedTableId, setDraggedTableId] = useState(null);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [hoveredColumn, setHoveredColumn] = useState(null);
      const [isOptimized, setIsOptimized] = useState(false);
      const [isMobile, setIsMobile] = useState(false);
      const [expandedCategories, setExpandedCategories] = useState({
        "Xác thực & Quyền (RBAC)": true,
        "Xác thực (Supabase)": true
      });
      const [expandedTables, setExpandedTables] = useState({});

      const canvasRef = useRef(null);

      useEffect(() => {
        const checkMobile = () => {
          setIsMobile(window.innerWidth < 768);
        };
        checkMobile();
        window.addEventListener("resize", checkMobile);
        return () => window.removeEventListener("resize", checkMobile);
      }, []);

      const toggleCategory = (cat) => {
        setExpandedCategories(prev => ({ ...prev, [cat]: !prev[cat] }));
      };

      const toggleTableExpand = (tableId) => {
        setExpandedTables(prev => ({ ...prev, [tableId]: !prev[tableId] }));
      };

      const toggleOptimizations = () => {
        setIsOptimized(!isOptimized);
        setTables(prev => prev.map(t => {
          if (t.id === "public.donation_campaigns") {
            return {
              ...t,
              columns: t.columns.map(col => col.name === "id" ? { ...col, type: isOptimized ? "text" : "uuid", notes: isOptimized ? "🚨 Lệch kiểu" : "✨ Đồng bộ UUID" } : col)
            };
          }
          if (t.id === "public.donations") {
            return {
              ...t,
              columns: t.columns.map(col => col.name === "campaign_id" ? { ...col, type: isOptimized ? "text" : "uuid", notes: isOptimized ? "🚨 Lệch khóa ngoại" : "✨ Đồng bộ UUID" } : col)
            };
          }
          return t;
        }));
      };

      const filteredTables = useMemo(() => {
        return tables.filter(t => {
          const matchesSchema = selectedSchema === "all" || t.schema === selectedSchema;
          const matchesPathway = selectedPathway === "all" || PATHWAYS.find(p => p.id === selectedPathway)?.highlight.includes(t.id);
          const matchesSearch = t.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                               t.columns.some(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
          return matchesSchema && matchesPathway && matchesSearch;
        });
      }, [tables, selectedSchema, selectedPathway, searchTerm]);

      const categoriesGrouped = useMemo(() => {
        const groups = {};
        filteredTables.forEach(t => {
          const cat = t.category || "Khác";
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(t);
        });
        return groups;
      }, [filteredTables]);

      const relationships = useMemo(() => {
        const list = [];
        tables.forEach(sourceTable => {
          sourceTable.columns.forEach(col => {
            if (col.isFk && col.fkTo) {
              const targetTable = tables.find(t => t.id === col.fkTo);
              if (targetTable) {
                list.push({
                  id: `${sourceTable.id}.${col.name}->${targetTable.id}`,
                  source: sourceTable.id,
                  sourceCol: col.name,
                  target: targetTable.id,
                  targetCol: "id"
                });
              }
            }
          });
        });
        return list;
      }, [tables]);

      const handleMouseDown = (e) => {
        if (e.target.closest(".table-card") || e.target.closest("button") || e.target.closest("input") || e.target.closest("select")) return;
        setIsDraggingCanvas(true);
        setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
      };

      const handleMouseMove = (e) => {
        if (isDraggingCanvas) {
          setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
        } else if (draggedTableId) {
          const dx = (e.clientX - dragStart.x) / zoom;
          const dy = (e.clientY - dragStart.y) / zoom;
          setTables(prev => prev.map(t => t.id === draggedTableId ? { ...t, x: t.x + dx, y: t.y + dy } : t));
          setDragStart({ x: e.clientX, y: e.clientY });
        }
      };

      const handleMouseUp = () => {
        setIsDraggingCanvas(false);
        setDraggedTableId(null);
      };

      const handleTableDragStart = (e, tableId) => {
        e.stopPropagation();
        setDraggedTableId(tableId);
        setDragStart({ x: e.clientX, y: e.clientY });
      };

      const focusOnTable = (table) => {
        setSelectedTable(table);
        const canvasContainer = canvasRef.current;
        if (canvasContainer) {
          const rect = canvasContainer.getBoundingClientRect();
          setPan({
            x: (rect.width / 2) - (table.x * zoom),
            y: (rect.height / 2) - (table.y * zoom)
          });
        }
      };

      const getSchemaColors = (schema) => {
        switch (schema) {
          case "auth": return { bg: "bg-emerald-950/40", border: "border-emerald-500/30 hover:border-emerald-400", dot: "bg-emerald-500" };
          case "realtime": return { bg: "bg-orange-950/40", border: "border-orange-500/30 hover:border-orange-400", dot: "bg-orange-500" };
          default: return { bg: "bg-indigo-950/40", border: "border-indigo-500/30 hover:border-indigo-400", dot: "bg-indigo-500" };
        }
      };

      if (isMobile) {
        return (
          <div className="min-h-screen w-full bg-[#070a13] text-slate-200 flex flex-col font-sans select-none overflow-y-auto">
            <div className="p-4 bg-[#0d1324] border-b border-slate-800/80 flex items-center justify-between sticky top-0 z-35 shadow-md">
              <div className="flex items-center gap-2">
                <Icons.Database />
                <div>
                  <h1 className="font-bold text-sm text-slate-100">Cơ sở dữ liệu SECURE</h1>
                  <p className="text-[10px] text-slate-400">Mobile Accordion View</p>
                </div>
              </div>
              <button onClick={toggleOptimizations} className={`flex items-center gap-1 px-2.5 py-1 rounded-lg text-[10px] font-bold border transition ${isOptimized ? "bg-emerald-600/20 border-emerald-500 text-emerald-300" : "bg-amber-600/20 border-amber-500 text-amber-300"}`}>
                <Icons.Sparkles />{isOptimized ? "Đã sửa FK" : "Sửa FK"}
              </button>
            </div>
            <div className="p-4 space-y-3 bg-[#0d1324]/40 border-b border-slate-800/60 sticky top-[57px] z-30 backdrop-blur-md">
              <div className="relative">
                <input type="text" placeholder="Tìm bảng hoặc cột..." className="w-full bg-slate-900/80 text-slate-200 border border-slate-800 rounded-xl px-3 py-2 pl-9 text-xs focus:outline-none focus:border-indigo-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                <span className="absolute left-3 top-2.5 text-slate-555"><Icons.Search /></span>
              </div>
              <div className="flex items-center gap-1.5 overflow-x-auto pb-1 scrollbar-none">
                <span className="text-[10px] font-bold text-slate-500 uppercase shrink-0 mr-1"><Icons.Filter /></span>
                {["all", "public", "auth", "realtime"].map(s => (
                  <button key={s} onClick={() => setSelectedSchema(s)} className={`px-2.5 py-1 text-[11px] rounded-lg font-semibold capitalize shrink-0 transition ${selectedSchema === s ? "bg-indigo-600 text-white" : "bg-slate-900 border border-slate-800 text-slate-400 hover:bg-slate-850"}`}>{s}</button>
                ))}
              </div>
              <select className="w-full bg-slate-900 text-slate-300 border border-slate-800 rounded-lg p-2 text-xs focus:outline-none focus:border-indigo-500" value={selectedPathway} onChange={(e) => setSelectedPathway(e.target.value)}>
                {PATHWAYS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="flex-1 p-4 space-y-3 pb-8">
              {Object.keys(categoriesGrouped).sort().map(cat => {
                const isCatExpanded = !!expandedCategories[cat];
                const tablesInCat = categoriesGrouped[cat];
                return (
                  <div key={cat} className="border border-slate-800/80 rounded-xl overflow-hidden bg-[#0a0f1d]/30">
                    <div onClick={() => toggleCategory(cat)} className="p-3 bg-[#0d1324]/90 border-b border-slate-800/60 flex items-center justify-between cursor-pointer transition hover:bg-[#12192e]">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-bold text-slate-200">{cat}</span>
                        <span className="text-[10px] bg-slate-800/80 text-slate-300 px-2 py-0.5 rounded-full font-mono">{tablesInCat.length}</span>
                      </div>
                      {isCatExpanded ? <Icons.ChevronDown /> : <Icons.ChevronRight />}
                    </div>
                    {isCatExpanded && (
                      <div className="p-3 space-y-3 bg-[#080c14]/40">
                        {tablesInCat.map(table => {
                          const isTableExpanded = !!expandedTables[table.id];
                          const colors = getSchemaColors(table.schema);
                          return (
                            <div key={table.id} className={`border rounded-lg overflow-hidden transition-all duration-200 ${isTableExpanded ? 'border-indigo-500/50 bg-[#0c1223]/70' : 'border-slate-800/60 bg-[#0b0f19]/40'}`}>
                              <div onClick={() => toggleTableExpand(table.id)} className="p-2.5 flex items-center justify-between cursor-pointer hover:bg-[#131b31]/40">
                                <div className="flex items-center gap-2 truncate">
                                  <span className={`w-2 h-2 rounded-full shrink-0 ${colors.dot}`}></span>
                                  <span className="font-mono text-xs font-bold text-slate-100 truncate">{table.name}</span>
                                </div>
                                <div className="flex items-center gap-1.5 shrink-0">
                                  <span className="text-[9px] font-bold text-slate-400 bg-slate-900/80 px-1.5 py-0.5 rounded-full capitalize font-mono">{table.schema}</span>
                                  {isTableExpanded ? <Icons.ChevronDown /> : <Icons.ChevronRight />}
                                </div>
                              </div>
                              {isTableExpanded && (
                                <div className="p-2 border-t border-slate-850/50 bg-[#070a13]/70 space-y-2">
                                  {table.columns.map(col => (
                                    <div key={col.name} className="p-2 bg-slate-900/60 rounded-lg border border-slate-800/40 flex flex-col gap-1 hover:border-slate-700/60 transition">
                                      <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-1.5 min-w-0">
                                          {col.isPk ? <Icons.Key className="text-yellow-400 shrink-0" /> : col.isFk ? <Icons.Key className="text-indigo-400 shrink-0" /> : <span className="w-3.5 shrink-0"></span>}
                                          <span className="font-mono text-xs text-slate-200 truncate">{col.name}</span>
                                        </div>
                                        <span className={`font-mono text-[9px] px-1.5 py-0.5 rounded ${col.type === 'uuid' ? 'text-indigo-300 bg-indigo-500/10' : col.notes?.includes('🚨') ? 'text-amber-400 bg-amber-500/10' : 'text-slate-500 bg-slate-950'}`}>{col.type}</span>
                                      </div>
                                      {col.notes && <div className="text-[10px] text-amber-450 flex items-center gap-1 bg-amber-500/10 p-1.5 rounded border border-amber-500/20 mt-0.5"><Icons.Warning className="w-3 h-3 shrink-0" /><span>{col.notes}</span></div>}
                                      {col.isFk && col.fkTo && <div className="text-[10px] text-indigo-400 font-mono flex items-center gap-1 mt-0.5 bg-indigo-500/5 p-1 rounded border border-indigo-500/10"><span>➔</span><span className="truncate">Liên kết: {col.fkTo}</span></div>}
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen w-screen overflow-hidden bg-[#070a13]">
          <div className="w-80 flex flex-col border-r border-slate-800 bg-[#0d1324] shrink-0 z-10 select-none">
            <div className="p-4 border-b border-slate-800">
              <div className="flex items-center gap-2 mb-3">
                <Icons.Database /><h1 className="font-bold text-base text-slate-100">Cơ sở dữ liệu Đa thực thể</h1>
              </div>
              <div className="relative">
                <input type="text" placeholder="Tìm bảng hoặc cột..." className="w-full bg-slate-900/80 text-slate-200 border border-slate-800 rounded-lg px-3 py-1.5 pl-8 text-xs focus:outline-none focus:border-indigo-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                <span className="absolute left-2.5 top-2.5 text-slate-500"><Icons.Search /></span>
              </div>
            </div>
            <div className="p-4 border-b border-slate-800 bg-[#0a0f1d]/50">
              <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Bộ lọc Luồng Liên kết</label>
              <select className="w-full bg-slate-900 text-slate-200 border border-slate-800 rounded-lg p-2 text-xs focus:outline-none focus:border-indigo-500" value={selectedPathway} onChange={(e) => setSelectedPathway(e.target.value)}>
                {PATHWAYS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="p-4 border-b border-slate-800">
              <div className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Bộ lọc Schemas</div>
              <div className="flex flex-wrap gap-1">
                {["all", "public", "auth", "realtime"].map(s => (
                  <button key={s} onClick={() => setSelectedSchema(s)} className={`px-2 py-1 text-xs rounded font-semibold transition capitalize ${selectedSchema === s ? "bg-indigo-600 text-white" : "bg-slate-800/80 text-slate-300 hover:bg-slate-700"}`}>{s}</button>
                ))}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-1.5">
              <div className="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Danh Sách Bảng ({filteredTables.length})</div>
              {filteredTables.map(t => (
                <div key={t.id} onClick={() => focusOnTable(t)} className={`p-2 rounded-lg cursor-pointer border text-xs flex items-center justify-between transition ${selectedTable?.id === t.id ? "bg-[#181f33] border-indigo-500 text-indigo-300 shadow-md" : "bg-[#0f1526]/50 border-slate-800 text-slate-300 hover:bg-[#151c30]"}`}>
                  <div className="flex items-center gap-2 truncate"><span className={`w-2 h-2 rounded-full shrink-0 ${getSchemaColors(t.schema).dot}`}></span><span className="font-mono text-[11px] truncate">{t.name}</span></div>
                  <span className="text-[9px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded shrink-0">{t.category}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="flex-1 flex flex-col overflow-hidden relative" ref={canvasRef}>
            <div className="absolute top-4 left-4 right-4 flex items-center justify-between z-10 pointer-events-none">
              <div className="bg-[#0c101b]/90 backdrop-blur-md border border-slate-800 px-4 py-2.5 rounded-xl pointer-events-auto shadow-2xl flex items-center gap-3">
                <span className="flex h-2 w-2 relative"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                <span className="text-xs font-bold text-slate-200">Bản đồ Thực thể Khách hàng Supabase</span>
                <div className="h-4 w-px bg-slate-800"></div>
                <div className="text-[11px] text-slate-400 flex items-center gap-1.5"><Icons.Info /> Di chuyển chuột và kéo thả để sắp xếp sơ đồ</div>
              </div>
              <div className="flex items-center gap-2 pointer-events-auto">
                <div className="bg-[#0c101b]/90 backdrop-blur-md border border-slate-800 p-1 rounded-xl flex items-center gap-1">
                  <button onClick={() => setZoom(prev => Math.min(prev + 0.05, 1.5))} className="p-1.5 hover:bg-slate-800 rounded-lg text-slate-300"><Icons.Maximize /></button>
                  <button onClick={() => setZoom(prev => Math.max(prev - 0.05, 0.4))} className="p-1.5 hover:bg-slate-800 rounded-lg text-slate-300"><Icons.Minimize /></button>
                  <button onClick={() => { setZoom(0.75); setPan({ x: 300, y: 100 }); }} className="px-2 py-1 text-xs hover:bg-slate-800 text-slate-300 rounded-lg">Reset</button>
                </div>
                <button onClick={toggleOptimizations} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition shadow-lg ${isOptimized ? "bg-emerald-600/20 border-emerald-500 text-emerald-300" : "bg-amber-600/20 border-amber-500 text-amber-300 animate-pulse"}`}>
                  <Icons.Sparkles />{isOptimized ? "Đã sửa lỗi FK" : "Mô phỏng sửa lỗi FK"}
                </button>
              </div>
            </div>
            <div className="w-full h-full cursor-grab grid-bg relative" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} style={{ cursor: isDraggingCanvas ? 'grabbing' : 'grab' }}>
              <svg className="absolute inset-0 pointer-events-none w-full h-full overflow-visible z-0" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`, transformOrigin: '0 0' }}>
                <defs>
                  <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" /></marker>
                  <marker id="arrow-active" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" /></marker>
                  <marker id="arrow-warning" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b" /></marker>
                </defs>
                {relationships.map(rel => {
                  const source = tables.find(t => t.id === rel.source);
                  const target = tables.find(t => t.id === rel.target);
                  if (!source || !target) return null;
                  const isPathwayActive = selectedPathway === 'all' || (PATHWAYS.find(p => p.id === selectedPathway)?.highlight.includes(source.id) && PATHWAYS.find(p => p.id === selectedPathway)?.highlight.includes(target.id));
                  const startX = source.x + 130;
                  const startY = source.y + 70;
                  const endX = target.x + 130;
                  const endY = target.y + 70;
                  const isHighlighted = hoveredColumn === `${rel.source}.${rel.sourceCol}` || selectedTable?.id === rel.source || selectedTable?.id === rel.target;
                  const isWarning = rel.sourceCol === 'campaign_id' && !isOptimized;
                  return (
                    <g key={rel.id} className="transition-opacity duration-300" style={{ opacity: isPathwayActive ? 1 : 0.15 }}>
                      <path d={`M ${startX} ${startY} C ${startX + (endX - startX) * 0.5} ${startY}, ${startX + (endX - startX) * 0.5} ${endY}, ${endX} ${endY}`} fill="none" stroke={isWarning ? "#f59e0b" : isHighlighted ? "#6366f1" : "#1e293b"} strokeWidth={isHighlighted ? 2.5 : isWarning ? 2 : 1.2} strokeDasharray={isWarning ? "5 3" : isHighlighted ? "0" : "4 2"} className="relation-line" markerEnd={`url(#${isWarning ? 'arrow-warning' : isHighlighted ? 'arrow-active' : 'arrow'})`} />
                    </g>
                  );
                })}
              </svg>
              <div className="absolute inset-0 origin-top-left" style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})` }}>
                {filteredTables.map(table => {
                  const isSelected = selectedTable?.id === table.id;
                  const colors = getSchemaColors(table.schema);
                  const isPathwayActive = selectedPathway === 'all' || PATHWAYS.find(p => p.id === selectedPathway)?.highlight.includes(table.id);
                  return (
                    <div key={table.id} className={`absolute table-card bg-[#0b0f19]/95 backdrop-blur-sm rounded-xl border-2 shadow-2xl overflow-hidden select-none z-10 transition-all ${isSelected ? "border-indigo-500 ring-4 ring-indigo-500/20" : colors.border}`} style={{ left: table.x, top: table.y, width: '260px', opacity: isPathwayActive ? 1 : 0.25 }} onClick={(e) => { e.stopPropagation(); setSelectedTable(table); }}>
                      <div className={`px-3 py-2 cursor-move flex items-center justify-between border-b border-slate-800 ${colors.bg}`} onMouseDown={(e) => handleTableDragStart(e, table.id)}>
                        <div className="flex items-center gap-1.5 truncate"><span className={`w-2 h-2 rounded-full ${colors.dot}`}></span><span className="font-mono text-xs font-bold text-slate-100 truncate">{table.name}</span></div>
                        <span className="text-[9px] font-bold text-slate-400 bg-slate-900/80 px-1.5 py-0.5 rounded-full capitalize">{table.schema}</span>
                      </div>
                      <div className="p-1.5 space-y-0.5">
                        {table.columns.map(col => (
                          <div key={col.name} className={`flex items-center justify-between px-2 py-1 rounded transition ${hoveredColumn === `${table.id}.${col.name}` ? "bg-indigo-500/10 text-indigo-300 font-semibold" : "text-slate-300 hover:bg-slate-800/40"}`} onMouseEnter={() => col.isFk && setHoveredColumn(`${table.id}.${col.name}`)} onMouseLeave={() => col.isFk && setHoveredColumn(null)}>
                            <div className="flex items-center gap-1.5 min-w-0">{col.isPk ? <Icons.Key className="text-yellow-400 shrink-0" /> : col.isFk ? <Icons.Key className="text-indigo-400 shrink-0" /> : <span className="w-3.5 shrink-0"></span>}<span className="font-mono text-[11px] truncate">{col.name}</span></div>
                            <span className={`font-mono text-[10px] px-1 py-0.5 rounded truncate ${col.type === 'uuid' ? 'text-indigo-300 bg-indigo-500/10' : col.notes?.includes('🚨') ? 'text-amber-400 bg-amber-500/10' : 'text-slate-500 bg-slate-900'}`}>{col.type}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            {selectedTable && (
              <div className="absolute right-4 top-20 bottom-4 w-80 bg-[#090d18]/95 backdrop-blur-md border border-slate-800 rounded-xl shadow-2xl z-20 flex flex-col overflow-hidden">
                <div className="p-3 border-b border-slate-800 flex items-center justify-between bg-slate-900/30">
                  <div className="flex items-center gap-1.5 truncate"><span className={`w-2.5 h-2.5 rounded-full ${getSchemaColors(selectedTable.schema).dot}`}></span><h3 className="font-mono font-bold text-sm text-slate-100 truncate">{selectedTable.id}</h3></div>
                  <button onClick={() => setSelectedTable(null)} className="p-1 hover:bg-slate-800 rounded text-slate-400 transition"><Icons.Close /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                  <div>
                    <div className="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Phân loại</div>
                    <div className="grid grid-cols-2 gap-2 text-xs">
                      <div className="bg-slate-900 p-2 rounded-lg border border-slate-800"><div className="text-slate-500 text-[10px]">Schema</div><div className="text-slate-200 font-mono font-semibold capitalize">{selectedTable.schema}</div></div>
                      <div className="bg-slate-900 p-2 rounded-lg border border-slate-800"><div className="text-slate-500 text-[10px]">Mục đích</div><div className="text-slate-200 font-semibold truncate">{selectedTable.category}</div></div>
                    </div>
                  </div>
                  <div>
                    <div className="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2">Đặc điểm Liên kết cấu trúc</div>
                    <div className="space-y-2">
                      {selectedTable.columns.map(col => (
                        <div key={col.name} className="bg-slate-900/40 p-2.5 rounded-lg border border-slate-800/80 flex flex-col gap-1">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-1.5">{col.isPk ? <Icons.Key className="text-yellow-400" /> : col.isFk ? <Icons.Key className="text-indigo-400" /> : null}<span className="font-mono text-xs font-bold text-slate-200">{col.name}</span></div>
                            <span className="font-mono text-[10px] text-slate-400">{col.type}</span>
                          </div>
                          {col.notes && <div className="text-[10px] text-amber-400 flex items-center gap-1 bg-amber-500/10 p-1.5 rounded border border-amber-500/20"><Icons.Warning className="w-3.5 h-3.5" /><span>{col.notes}</span></div>}
                          {col.isFk && col.fkTo && <span className="text-[10px] text-indigo-400 font-mono mt-1">Liên kết tới ➔ {col.fkTo}</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
